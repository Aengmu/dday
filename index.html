<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion D-Day Widget with Background</title>
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./snoyqo.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      
      /* 🖼️ [배경 이미지 설정] 저장소에 올려둔 bg.jpg 파일을 배경으로 불러옵니다 */
      background-image: url('./bg.png');
      background-size: cover;      /* 화면에 꽉 차게 조절 */
      background-position: center; /* 이미지 중앙 맞춤 */
      background-repeat: no-repeat;
    }

    /* 💡 배경 사진 때문에 글씨가 잘 안 보일 때를 대비해 약간의 어두운 필터를 씌웁니다 */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.4); /* 숫자(0.4)를 높이면 배경이 더 어두워집니다 */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dday {
      font-family: 'MyCustomFont', sans-serif !important;
      color: #00ff00; 
      font-size: 6rem; 
      letter-spacing: -2px; 
      transform: scale(0.6, 2); 
      display: inline-block;
      text-align: center;
      z-index: 1; /* 어두운 필터보다 위에 글씨가 오도록 설정 */
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="dday" id="dday">D-DAY</div>
  </div>

  <script>
    function updateDDay() {
      const now = new Date();
      let targetYear = now.getFullYear();
      let targetDate = new Date(targetYear, 10, 19); // 11월 19일 (월은 0부터 시작하므로 10)

      if (now > targetDate && now.getDate() !== 19) {
        targetDate = new Date(targetYear + 1, 10, 19);
      }

      const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffTime = targetDate - todayMidnight;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      const ddayElement = document.getElementById('dday');

      if (diffDays > 0) {
        ddayElement.innerText = `D-${diffDays}`;
      } else if (diffDays === 0) {
        ddayElement.innerText = `D-DAY`;
      } else {
        ddayElement.innerText = `D+${Math.abs(diffDays)}`;
      }
    }

    updateDDay();
    setInterval(updateDDay, 3600000);
  </script>
</body>
</html>
