<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion D-Day Widget</title>
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./DS-DIGI.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 90%;
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;

      background-image: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0)), url('./bg.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .dday {
      font-family: 'MyCustomFont', sans-serif !important;
      color: #ff0000;
      font-size: 6rem;
      letter-spacing: -2px;
      transform: scale(0.6, 2);
      display: inline-block;
      text-align: center;

      /* ⬇️ 글자를 아래로 이동시키는 코드입니다! */
      /* 더 내리고 싶다면 40px, 50px로 숫자를 늘려보세요 */
      margin-top: 30px; 
    }
  </style>
</head>
<body>

  <div class="dday" id="dday">D-DAY</div>

  <script>
    function updateDDay() {
      const now = new Date();
      let targetYear = now.getFullYear();
      let targetDate = new Date(targetYear, 10, 19); // 11월 19일

      if (now > targetDate && now.getDate() !== 19) {
        targetDate = new Date(targetYear + 1, 10, 19);
      }

      const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffTime = targetDate - todayMidnight;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      const ddayElement = document.getElementById('dday');

      if (diffDays > 0) {
        ddayElement.innerText = `D-${diffDays}`;
      } else if (diffDays === 0) {
        ddayElement.innerText = `D-DAY`;
      } else {
        ddayElement.innerText = `D+${Math.abs(diffDays)}`;
      }
    }

    updateDDay();
    setInterval(updateDDay, 3600000);
  </script>
</body>
</html>
