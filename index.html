<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion D-Day Widget with Background</title>
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./snoyqo.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      
      /* 🖼️ 배경 이미지: 올려두신 bg.png 파일을 불러옵니다 */
      background-image: url('./bg.png');
      background-size: cover;      /* 화면에 꽉 차게 조절 */
      background-position: center; /* 이미지 중앙 맞춤 */
      background-repeat: no-repeat;
    }

    /* 💡 글자 가독성을 위해 배경을 약간 어둡게 해주는 필터 */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.3); /* 배경이 너무 어두우면 0.3을 0.1이나 0.2로 낮춰주세요 */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dday {
      font-family: 'MyCustomFont', sans-serif !important;
      color: #00ff00; 
      font-size: 6rem; 
      letter-spacing: -2px; 
      transform: scale(0.6, 2); 
      display: inline-block;
      text-align: center;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="dday" id="dday">D-DAY</div>
  </div>

  <script>
    function updateDDay() {
      const now = new Date();
      let targetYear = now.getFullYear();
      let targetDate = new Date(targetYear, 10, 19); // 11월 19일 (월은 0부터 시작하므로 10)

      if (now > targetDate && now.getDate() !== 19) {
        targetDate = new Date(targetYear + 1, 10, 19);
      }

      const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffTime = targetDate - todayMidnight;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      const ddayElement = document.getElementById('dday');

      if (diffDays > 0) {
        ddayElement.innerText = `D-${diffDays}`;
      } else if (diffDays === 0) {
        ddayElement.innerText = `D-DAY`;
      } else {
        ddayElement.innerText = `D+${Math.abs(diffDays)}`;
      }
    }

    updateDDay();
    setInterval(updateDDay, 3600000);
  </script>
</body>
</html>
